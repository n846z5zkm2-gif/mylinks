<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />


    <!-- Шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ---------- ГЛОБАЛЬНЫЕ СБРОСЫ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f0eb;
            padding: 24px;
            transition: background 0.3s;
        }

        /* ---------- КАРТОЧКА ---------- */
        .card {
            max-width: 440px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            padding: 48px 36px 40px;
            box-shadow: 0 20px 60px rgba(90, 30, 30, 0.08), 0 8px 24px rgba(90, 30, 30, 0.04);
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(120, 40, 40, 0.06);
        }

        /* ---------- АВАТАР ---------- */
        .avatar {
            width: 112px;
            height: 112px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 18px;
            display: block;
            border: 3px solid #ffffff;
            box-shadow: 0 12px 32px rgba(120, 40, 40, 0.12);
            background: #ece5dd;
        }

        /* ---------- ИМЯ И ОПИСАНИЕ ---------- */
        .name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1e1412;
            margin-bottom: 4px;
        }

        .sub {
            font-size: 15px;
            font-weight: 400;
            color: #7a6a64;
            margin-bottom: 32px;
            letter-spacing: 0.01em;
        }

        /* ---------- КНОПКИ-ССЫЛКИ (БОРДОВЫЙ АКЦЕНТ) ---------- */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            padding: 18px 20px;
            margin-bottom: 14px;
            background: #f8f5f2;
            border-radius: 60px;
            text-decoration: none;
            color: #1e1412;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.25s ease;
            border: 1px solid rgba(120, 40, 40, 0.05);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.01);
            position: relative;
            overflow: hidden;
        }

        /* Бордовая полоса при наведении */
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 2px;
            background: linear-gradient(135deg, #8a2a2a 0%, #b34747 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #ffffff;
            box-shadow: 0 12px 28px rgba(120, 40, 40, 0.08);
            border-color: rgba(120, 40, 40, 0.08);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn i {
            font-size: 22px;
            width: 28px;
            color: #5a2a2a;
            transition: transform 0.25s ease;
        }

        .btn:hover i {
            transform: scale(1.08);
        }

        /* Цветные акценты для иконок (европейская сдержанность) */
        .btn.instagram i { color: #b34a5e; }
        .btn.telegram i { color: #3f7e9c; }
        .btn.pinterest i { color: #b34a4a; }

        @media (prefers-color-scheme: dark) {
            .btn.instagram i { color: #d46a7e; }
            .btn.telegram i { color: #6a9ebd; }
            .btn.pinterest i { color: #d46a6a; }
        }

        .btn:last-child {
            margin-bottom: 0;
        }

        /* ---------- ФУТЕР ---------- */
        .footer {
            margin-top: 32px;
            font-size: 13px;
            font-weight: 300;
            color: #b0a09a;
            letter-spacing: 0.4px;
            border-top: 1px solid rgba(120, 40, 40, 0.06);
            padding-top: 24px;
        }

        /* ---------- ТЁМНАЯ ТЕМА (автоматическая) ---------- */
        @media (prefers-color-scheme: dark) {
            body {
                background: #161010;
            }
            .card {
                background: #1e1614;
                border-color: rgba(180, 80, 80, 0.08);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            }
            .name {
                color: #f0e8e4;
            }
            .sub {
                color: #a69088;
            }
            .btn {
                background: #2a1e1a;
                color: #f0e8e4;
                border-color: rgba(180, 80, 80, 0.06);
            }
            .btn:hover {
                background: #342420;
                border-color: rgba(180, 80, 80, 0.12);
                box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
            }
            .btn i {
                color: #c07070;
            }
            .footer {
                color: #7a6a64;
                border-top-color: rgba(180, 80, 80, 0.06);
            }
        }

        /* ---------- АДАПТИВНОСТЬ ---------- */
        @media (max-width: 480px) {
            .card {
                padding: 36px 24px 32px;
                border-radius: 32px;
            }
            .name {
                font-size: 24px;
            }
            .btn {
                padding: 16px 18px;
                font-size: 15px;
            }
            .btn i {
                font-size: 20px;
                width: 24px;
            }
            .avatar {
                width: 92px;
                height: 92px;
            }
        }
    </style>
</head>
